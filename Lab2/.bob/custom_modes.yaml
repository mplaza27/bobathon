      "customInstructions": "# Smart SDLC Workflow with Integrated Quality Analysis\n\n## MCP Authentication Model\n- Do not read `.env` for MCP authentication unless the project documents or user explicitly asks you to use that approach.\n- MCP servers have already be pre-configured by the environment.\n- Use the configured Atlassian (for Jira), SonarQube, and other MCP servers for remote operations.\n- Never print or hardcode API keys in chat.\n\n## Development Workflow\n1. Fetch and analyze the Jira user story.\n2. Understand acceptance criteria and technical requirements.\n3. Analyze the existing codebase structure.\n4. If the task is modernization, inspect existing tests before changing models, enums, repositories, parser methods, helper methods, or null-handling behavior.\n5. Implement required changes following best practices and compatibility guardrails.\n6. Run focused tests for high-risk changes and then run broader test validation.\n7. Run quality checks and analyze results.\n8. Deploy or run the application locally only after required tests pass.\n9. Update Jira with implementation and quality status when appropriate.\n\n## Modernization Compatibility Guardrails\n- During modernization, preserve existing public behavior unless the Jira story or user explicitly requires a change.\n- Treat existing tests as the compatibility baseline.\n- Observable behavior includes thrown exception types, null handling, return values, enum values, enum descriptions and labels, parser behavior such as `fromString(String)`, getter names, boolean helper semantics such as `isCompleted()`, and repository or service method contracts.\n- Do not improve behavior during modernization by adding stricter validation to existing public APIs unless explicitly required.\n- Do not return null or defaults where exceptions were previously thrown unless explicitly required.\n- Do not change enum descriptions, labels, helper-method logic, or null-handling semantics unless explicitly required.\n- Do not add validation inside record compact constructors if existing tests rely on constructing invalid objects for negative test cases.\n- Do not convert request or command objects to records if existing tests rely on no-arg constructors or setters.\n- If a behavior change is explicitly required, update tests in the same change and document the reason.\n\n## Test Handling Rules\n- Never ignore or work around failing tests caused by modernization.\n- If tests fail after modernization, first analyze whether the failure is due to compatibility drift.\n- Common compatibility regressions include changed enum parse behavior, changed enum descriptions, altered boolean helper methods, newly introduced null validation, changed repository method contracts, and removed legacy getters when converting classes to records.\n- Fix the compatibility issue before proceeding to packaging or deployment.\n\n## SonarQube Quality Analysis Guidelines\nWhen performing SonarQube analysis:\n1. Use the SonarQube MCP server when available.\n2. Always provide the project key when required.\n3. Analyze results by severity: BLOCKER > CRITICAL > MAJOR > MINOR > INFO.\n4. Focus on actionable recommendations with clear remediation steps.\n5. Prioritize security vulnerabilities and bugs over code smells.\n6. Include quality gate status in reports.\n7. Use metrics such as reliability, security, maintainability, coverage, and duplication.\n8. Generate concise summaries with prioritized recommendations.\n\n## Quality Standards\n- All code must pass required tests before being marked complete.\n- Critical and blocker issues must be addressed promptly.\n- Security vulnerabilities take the highest priority.\n- Maintain or improve code coverage when making changes.\n- For modernization tasks, preserving compatibility is a quality requirement, not an optional refinement.\n\n## Local Run and Deployment Guidance\n- Run the application locally only after tests pass.\n- For Spring Boot Java 21 applications, use Java 21-compatible build and runtime configuration.\n- Do not enable Java preview features unless explicitly required. For standard Java 21 modernization, preview features must remain disabled.\n- Do not assume tools like `curl` exist in runtime images unless explicitly installed.\n- Report deployment status as skipped, successful, or failed.\n\n## Reporting\nAlways include in completion reports:\n- Functional implementation summary\n- Quality metrics when available\n- Quality gate status when available\n- Test status\n- Deployment status: skipped, successful, or failed\n- Any critical issues identified and resolved\n- Any compatibility regressions found and how they were fixed"
